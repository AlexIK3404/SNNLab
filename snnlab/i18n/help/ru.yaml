experiment:
  seed:
    title: Случайный seed
    short: Управляет воспроизводимой случайной инициализацией и порядком sample.
    long: Одинаковый seed при одинаковом ПО и конфигурации помогает воспроизводить
      веса, расписание sample и стохастическую генерацию спайков.
  samples_per_epoch:
    title: Sample на эпоху
    short: Размер фиксированной обучающей подвыборки, проходящей через сеть за одну
      эпоху.
    long: Подвыборка выбирается один раз из train pool. Каждая следующая эпоха проходит
      по тем же объектам в новом детерминированном порядке, поэтому число эпох имеет
      обычный и воспроизводимый смысл.
  epochs:
    title: Число эпох
    short: Сколько полных проходов выполнить по выбранной обучающей подвыборке.
    long: Например, 300 sample на эпоху и 5 эпох дают 1500 последовательных предъявлений.
      Порядок внутри каждой эпохи перемешивается детерминированно и сохраняется в
      checkpoint.
runtime:
  checkpoint_every:
    title: Интервал checkpoint
    short: Сохраняет состояние модели каждые N завершённых sample.
    long: Checkpoint содержит состояние модели, позицию расписания, историю и RNG-состояние
      для продолжения. Значение 0 отключает периодические checkpoint.
  live_frame_every_steps:
    title: Интервал live-кадров
    short: Определяет, как часто snapshot симуляции отправляются в GUI.
    long: Меньшее значение делает визуализацию плавнее, но увеличивает поток событий
      и нагрузку на отрисовку.
dataset:
  train_pool_size:
    title: Размер train pool
    short: Максимальное число объектов датасета, доступных расписанию обучения.
    long: Это не то же самое, что число обучающих sample. Pool задаёт доступные объекты,
      а расписание выбирает обрабатываемые.
  test_pool_size:
    title: Размер test pool
    short: Максимальное число тестовых объектов, загружаемых в session.
    long: Test pool предназначен для последующей оценки и не участвует в обновлениях
      обучения.
  kind:
    title: Датасет
    short: Выбирает источник данных эксперимента.
    long: Разные датасеты могут требовать разных encoder и размеров входной популяции.
izhikevich:
  a:
    title: Временной масштаб восстановления a
    short: Определяет скорость изменения переменной восстановления u.
    long: Большие значения a заставляют u реагировать быстрее, изменяя адаптацию и
      режим спайковой активности.
    affects:
    - скорость восстановления
    - адаптация
    - режим спайковой активности
  b:
    title: Чувствительность восстановления b
    short: Определяет чувствительность u к мембранному потенциалу v.
    long: Параметр b связывает переменную восстановления с подпороговой мембранной
      динамикой.
  c:
    title: Потенциал сброса c
    short: Мембранный потенциал, устанавливаемый сразу после спайка.
    long: Изменение c меняет состояние после спайка и может влиять на bursting и интервалы
      между спайками.
  d:
    title: Добавка восстановления d
    short: Значение, добавляемое к u после спайка.
    long: Большое d обычно усиливает постспайковую адаптацию и может снижать последующую
      активность.
simulation:
  dt_ms:
    title: Шаг интегрирования dt
    short: Временной шаг численного метода в модельных миллисекундах.
    long: Меньший dt обычно повышает вычислительную стоимость и может менять время
      спайков и численную устойчивость.
dci:
  n_exc:
    title: Размер возбуждающей популяции
    short: Число E-нейронов; текущая DCI-топология использует столько же I-нейронов.
    long: Увеличение популяции повышает потенциальную ёмкость представления и вычислительную
      стоимость. В текущей one-to-one схеме E→I n_inh равно n_exc.
  stimulus_ms:
    title: Длительность стимула
    short: Длительность одной попытки предъявления входа.
    long: Длинный стимул даёт больше времени для спайков и конкуренции, но повышает
      стоимость симуляции.
  rest_ms:
    title: Длительность отдыха
    short: Период нулевого входа после каждой попытки предъявления.
    long: Во время отдыха состояние сети продолжает эволюционировать, что позволяет
      затухать проводимостям и остаточной активности.
  exc_method:
    title: Численный метод E
    short: Метод интегрирования возбуждающих нейронов Ижикевича.
    long: Фреймворк позволяет E- и I-популяциям использовать разные методы. Их влияние
      нужно валидировать экспериментально.
  inh_method:
    title: Численный метод I
    short: Метод интегрирования тормозных нейронов Ижикевича.
    long: Другой метод может менять время тормозных спайков, конкуренцию, устойчивость
      и вычислительную стоимость.
  input_gain:
    title: Усиление входа
    short: Масштабирует прирост возбуждающей проводимости Input→E.
    long: Большие значения усиливают внешний драйв и обычно повышают E-активность.
  weight_exc_inh:
    title: Вес E→I
    short: Сила one-to-one связи от E к парному I.
    long: Определяет, насколько надёжно E-спайки активируют соответствующие тормозные
      нейроны.
  target_total_inhibition:
    title: Целевое суммарное торможение I→E
    short: Желаемая суммарная сила латерального торможения до масштабирования одной
      связи.
    long: Фреймворк делит значение на n_exc−1, чтобы смысл параметра сохранялся при
      изменении размера популяции.
  base_max_rate_hz:
    title: Базовая максимальная частота Poisson
    short: Начальный масштаб входной частоты для первой попытки предъявления.
    long: Входные значения преобразуются в Poisson-частоты до этого максимума.
  rate_increment_hz:
    title: Прибавка частоты
    short: Дополнительная максимальная частота после недостаточно активной попытки.
    long: Каждый retry увеличивает частоту на это значение до достаточной активности
      или достижения max_attempts.
  min_exc_spikes:
    title: Минимум E-спайков
    short: Порог принятия одной попытки предъявления.
    long: Если суммарных E-спайков меньше порога, sample повторяется с большей Poisson-частотой.
  max_attempts:
    title: Максимум попыток
    short: Максимальное число попыток с повышением частоты для одного sample.
    long: Финальная попытка используется для STDP и гомеостаза даже если порог принятия
      не достигнут.
  tau_pre_ms:
    title: Постоянная времени pre-trace
    short: Скорость затухания пресинаптического STDP-trace.
    long: Определяет, как долго недавние входные спайки влияют на более позднее постсинаптическое
      обновление.
  eta:
    title: Скорость обучения STDP η
    short: Глобальный масштаб обновлений весов Input→E.
    long: Большие значения ускоряют обучение, но могут дестабилизировать формирование
      рецептивных полей.
  x_target:
    title: Целевой trace STDP
    short: Опорное значение пресинаптического trace в текущем правиле весов.
    long: Обновление зависит от pre_trace − x_target в момент постсинаптического спайка.
  mu:
    title: Весовая степень STDP μ
    short: Определяет зависимость от оставшегося расстояния до верхней границы веса.
    long: Меняет характер замедления обучения при приближении веса к w_max.
  target_spikes_per_sample:
    title: Целевые спайки на sample
    short: Целевая активность sample-level гомеостаза.
    long: После финальной попытки тормозящий гомеостатический ток каждого E-нейрона
      корректируется по разности наблюдаемых и целевых спайков.
  homeo_learning_rate:
    title: Скорость обучения гомеостаза
    short: Масштаб sample-level гомеостатической коррекции.
    long: Слишком большое значение может быстро заглушить большинство нейронов, слишком
      малое — не подавить постоянных лидеров.
  homeo_max_current:
    title: Максимальный гомеостатический ток
    short: Верхняя граница дополнительного тормозящего тока E-нейрона.
    long: Ограничение предотвращает неограниченный рост гомеостатической коррекции.
reservoir:
  iris_neurons_per_feature:
    title: Нейронов популяции на признак Iris
    short: Число Gaussian encoder-нейронов для одного скалярного признака.
    long: Больше нейронов дают более детальное популяционное кодирование, но увеличивают
      размер входа.
  n_reservoir:
    title: Размер резервуара
    short: Число спайковых нейронов рекуррентного резервуара.
    long: Большой резервуар может формировать более богатые признаки ценой времени
      и памяти.
  simulation_ms:
    title: Длительность симуляции
    short: Время моделирования одного входного sample.
    long: Длинные окна могут захватывать больше рекуррентной динамики, но увеличивают
      время расчёта.
  max_rate_hz:
    title: Максимальная частота encoder
    short: Верхний масштаб частоты входного кодирования.
    long: Определяет плотность входных спайков и силу драйва резервуара.
  numerical_method:
    title: Численный метод резервуара
    short: Метод интегрирования всех нейронов резервуара в текущей реализации.
    long: Метод влияет на стоимость, численную устойчивость и время спайков.
  input_density:
    title: Плотность входных связей
    short: Доля существующих возможных связей Input→Reservoir.
    long: Большая плотность шире распределяет каждый вход по резервуару и повышает
      вычислительную стоимость.
  recurrent_density:
    title: Плотность рекуррентных связей
    short: Доля существующих возможных рекуррентных связей.
    long: Большая плотность усиливает взаимодействие и стоимость, а также может менять
      устойчивость активности.
  excitatory_ratio:
    title: Доля возбуждающих нейронов
    short: Доля нейронов резервуара с положительными исходящими рекуррентными весами.
    long: Остальные нейроны являются тормозными в текущей sign-based конструкции.
  input_scale:
    title: Масштаб входных весов
    short: Масштабирует случайные веса Input→Reservoir.
    long: 'Большие значения усиливают внешний драйв резервуара. При выборе датасета
      GUI применяет стартовый preset: Iris — 10.0, MNIST — 2.0. Очень высокая spike
      occupancy означает насыщение и требует уменьшения этого параметра.'
  recurrent_scale:
    title: Масштаб рекуррентных весов
    short: Масштабирует рекуррентные веса резервуара.
    long: 'Сильно влияет на усиление, длительность и устойчивость рекуррентной активности.
      Стартовый preset: Iris — 4.0, MNIST — 1.0. При предупреждении о насыщении уменьшайте
      его вместе с input scale и, при необходимости, bias current.'
  bias_current:
    title: Ток смещения
    short: Постоянный ток, добавляемый каждому нейрону резервуара.
    long: Bias может приближать нейроны к условиям спайка или удалять от них.
  tau_syn_ms:
    title: Постоянная затухания синапса
    short: Определяет экспоненциальное затухание синаптического состояния резервуара.
    long: Большие значения дольше сохраняют влияние спайков и увеличивают временную
      память.
  readout:
    title: Модель readout
    short: Внешняя ML-модель, обучаемая на признаках активности резервуара.
    long: Веса резервуара остаются фиксированными, а readout отображает извлечённые
      признаки в выход задачи.
  use_feature_selection:
    title: Отбор признаков
    short: Включает supervised-отбор наиболее информативных признаков резервуара.
    long: Может снизить размерность и стоимость readout, но сам отбор использует метки.
  select_k:
    title: Число признаков k
    short: Число признаков резервуара, сохраняемых перед обучением readout.
    long: Фактическое значение ограничивается доступной размерностью признаков.
evaluation:
  assignment_samples:
    title: Sample для назначения меток E
    short: Число размеченных train-объектов, используемых только для сопоставления
      E-нейронов классам.
    long: После завершения STDP сеть прогоняется без изменения весов. Для каждого
      E-нейрона вычисляется средний отклик на классы, после чего нейрону назначается
      лучший класс. Эти sample не должны рассматриваться как test-набор. Для чистого
      протокола их желательно не пересекать с объектами, использованными для STDP.
    affects:
    - стабильность назначения классов
    - число молчащих нейронов
    - время evaluation
  test_samples:
    title: Test sample
    short: Число объектов test-набора, по которым рассчитываются accuracy и матрица
      ошибок.
    long: Увеличение значения уменьшает случайный разброс оценки, но повышает время
      расчёта. Test labels используются только для метрик и не должны влиять на веса,
      гомеостаз или назначение E-нейронов.
    affects:
    - точность статистической оценки
    - время evaluation
  seed:
    title: Seed evaluation
    short: Управляет воспроизводимым выбором assignment/test sample и Poisson-спайками
      evaluation.
    long: Одинаковый seed при неизменной модели и протоколе должен воспроизводить
      тот же evaluation. Для итоговых выводов полезно повторять оценку на нескольких
      seed, а не опираться только на один прогон.
    affects:
    - выбор sample
    - Poisson-реализации
    - воспроизводимость
  homeostasis_mode:
    title: Гомеостаз при evaluation
    short: Определяет дополнительный гомеостатический ток E-нейронов во время оценки.
    long: «Замороженный обученный ток» сохраняет распределение возбудимости, сформированное
      во время обучения, но не адаптирует его дальше. «Нулевой ток» полностью убирает
      обученный гомеостатический ток и меняет динамический режим сети; это полезный
      ablation, но не основной режим оценки обученной модели.
    affects:
    - возбудимость E-нейронов
    - конкуренция
    - сопоставимость с обучением
  network_state_mode:
    title: Начальное динамическое состояние
    short: Выбирает, с какого состояния v, u и синаптических переменных начинается
      evaluation.
    long: «Свежее состояние» создаёт нейтральную динамику и затем непрерывно ведёт
      её по набору. «Копия обученного состояния» стартует с состояния checkpoint.
      Режим должен быть одинаковым при сравнении моделей и decoder-ов.
    affects:
    - начальный transient
    - воспроизводимость
    - сопоставимость прогонов
  prediction_rule:
    title: Правило классификации
    short: Преобразует спайки назначенных E-нейронов в предсказанный класс без внешнего
      ML-классификатора.
    long: Средний отклик усредняет ответы нейронов каждого класса. Суммарный отклик
      складывает ответы и чувствителен к числу назначенных нейронов. Сбалансированное
      top-k голосование нормирует вклад классов и может ограничивать число наиболее
      селективных E-нейронов на класс.
    affects:
    - финальное предсказание
    - чувствительность к дисбалансу назначений
  min_best_response:
    title: Минимальный лучший средний отклик
    short: Отбрасывает E-нейроны, которые слишком слабо реагируют даже на свой лучший
      класс.
    long: Порог применяется при назначении меток. Большое значение оставляет только
      активные нейроны, но может резко уменьшить покрытие классов и увеличить число
      unassigned E. Нулевое значение отключает этот фильтр.
    affects:
    - число назначенных E
    - качество и покрытие голосования
  min_absolute_margin:
    title: Минимальный абсолютный margin
    short: Требует минимальную разность между лучшим и вторым средним откликом E-нейрона.
    long: Фильтр измеряется в тех же единицах, что и средний отклик. Он полезен для
      удаления неоднозначных нейронов, но зависит от общего масштаба активности. Нулевое
      значение отключает фильтр.
    affects:
    - селективность назначенных E
    - число unassigned E
  min_relative_margin:
    title: Минимальная относительная селективность
    short: Требует заданную долю превосходства лучшего класса над вторым.
    long: Relative margin рассчитывается как (best − second) / best. Значение 0 не
      фильтрует нейроны, значение 1 требует почти полного отсутствия отклика на второй
      класс. Слишком высокий порог улучшает чистоту голосов ценой покрытия.
    affects:
    - чистота специализации
    - число назначенных E
    - покрытие классов
  top_k_per_class:
    title: Максимум E-нейронов на класс
    short: Ограничивает число наиболее качественных назначенных нейронов, участвующих
      от каждого класса.
    long: Параметр помогает не дать классам с огромным числом назначенных E доминировать
      только из-за размера группы. Значение 0 отключает ограничение. Слишком малый
      k может выбросить полезные нейроны и привести к отсутствию голосов у редких
      классов.
    affects:
    - баланс классов
    - число голосующих E
    - устойчивость decoder-а
  assignment_policy:
    title: Источник данных для назначения меток E
    short: Определяет, какие объекты train pool используются для назначения классов
      E-нейронам.
    long: Весь pool сохраняет текущий baseline-протокол. Режим исключения обучения
      создаёт непересекающуюся assignment-подвыборку, если в pool достаточно объектов.
      Training-subset использует только объекты, ранее предъявленные STDP. Точные
      индексы и пересечение сохраняются в data_protocol.json.
