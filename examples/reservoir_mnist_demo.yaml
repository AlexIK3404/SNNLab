  recurrent_scale: 1.0
  bias_current: 2.0
  tau_syn_ms: 8.0
  readout: ridge
  use_feature_selection: true
  select_k: 400
  neuron_a: 0.02
  neuron_b: 0.2
  neuron_c: -65.0
  neuron_d: 8.0
evaluation:
  test_samples: 200
  seed: 52
