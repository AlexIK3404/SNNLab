name: Feature request
description: Propose a research or framework improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Research or usability problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options: [Core API, DCI, Reservoir, GUI, Evaluation, Documentation, Backend]
